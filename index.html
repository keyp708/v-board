<style>
:root{--teal:#12b7c9;--deep:#06485d;--dark:#052f3d;--court:#f8a14b;--green:#20c995;--white:#fff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;background:linear-gradient(180deg,#064359,#10b8c8);color:#fff}.app{height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 10px calc(env(safe-area-inset-bottom) + 6px)}.topbar{height:72px;display:grid;grid-template-columns:74px 1fr 96px;align-items:center;gap:10px}.pill{height:58px;border:1px solid rgba(255,255,255,.3);border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(255,255,255,.12));box-shadow:inset 0 1px rgba(255,255,255,.25),0 8px 18px rgba(0,0,0,.18);color:#fff;font-weight:950;font-size:30px;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.scenePill{font-size:31px;padding:0 16px}.viewSwitch{height:46px;display:flex;gap:10px;justify-content:center;align-items:center}.seg{border:0;border-radius:999px;min-width:150px;padding:10px 18px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-size:19px;font-weight:950}.seg.active{background:#fff;color:#064b5d}.stage{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center}.courtShell{position:relative;width:min(93vw,540px);height:min(calc(100dvh - 226px),calc(93vw * 2));aspect-ratio:1/2;background:var(--teal);border-radius:25px;padding:10px;box-shadow:0 18px 36px rgba(0,0,0,.24),inset 0 0 0 2px rgba(255,255,255,.1)}.court{position:relative;width:100%;height:100%;border:6px solid #fff;border-radius:11px;background:linear-gradient(180deg,#ffc176,#f79332);overflow:hidden;touch-action:none}.court.hidden{display:none}.courtLabel{position:absolute;left:16px;top:16px;background:rgba(77,47,20,.85);padding:9px 13px;border-radius:10px;color:#fff;font-weight:950;font-size:18px;z-index:30}.attack{position:absolute;left:0;right:0;border-top:3px dashed rgba(255,255,255,.9);z-index:2}.attack.top{top:33.333%}.attack.bottom{top:66.666%}.netLine{position:absolute;left:0;right:0;top:50%;height:6px;background:#2c241c;box-shadow:0 -7px 0 #f7dfb2,0 7px 0 #f7dfb2;z-index:18}.netGrid{position:absolute;left:-2%;right:-2%;top:calc(50% - 13px);height:26px;background:repeating-linear-gradient(90deg,transparent 0 19px,#111 19px 23px),repeating-linear-gradient(0deg,transparent 0 8px,#111 8px 11px);z-index:20;opacity:.92}.marker{position:absolute;width:62px;height:62px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 34% 24%,#777,#252525 72%);border:4px solid #fff;box-shadow:0 10px 13px rgba(0,0,0,.34);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;touch-action:none;user-select:none;color:#fff}.marker.opp{background:radial-gradient(circle at 34% 24%,#888,#565656 72%);opacity:.98}.marker.selected{outline:5px solid var(--green)}.marker .main,.marker .sub{width:52px;text-align:center;line-height:1.02;font-weight:950;white-space:nowrap;overflow:hidden}.marker .main{font-size:18px}.marker .sub{font-size:11px;margin-top:3px}.marker.noName .main{font-size:16px}.marker.noName .sub{display:none}.area{position:absolute;border:2px dotted rgba(255,255,255,.9);border-radius:50%;transform:translate(-50%,-50%) rotate(var(--rot,0deg));z-index:34;pointer-events:none}.area.selected{border:3px solid var(--green);background:rgba(32,201,149,.04);z-index:35}.handle{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid #fff;background:var(--green);box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:95;touch-action:none;transform:translate(-50%,-50%)}.handle.rotate{background:#222}.ball{position:absolute;width:42px;height:42px;border-radius:50%;transform:translate(-50%,-50%);z-index:80;touch-action:none;filter:drop-shadow(0 17px 9px rgba(0,0,0,.35));background:conic-gradient(from 18deg,#fff 0 15%,#d53b34 15% 30%,#fff 30% 45%,#008e79 45% 60%,#fff 60% 75%,#d53b34 75% 88%,#008e79 88% 100%)}.ball.mikasa{background:conic-gradient(from 18deg,#ffe500 0 22%,#006bd6 22% 38%,#fff 38% 52%,#ffe500 52% 72%,#006bd6 72% 88%,#fff 88% 100%)}.ball:after{content:attr(data-brand);position:absolute;left:4px;right:4px;top:15px;text-align:center;font-size:7px;font-weight:950;color:#123}.bottom{height:82px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding-top:10px}.btn{border:0;border-radius:16px;background:#06485d;color:#fff;font-weight:950;font-size:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 8px 16px rgba(0,0,0,.23)}.btn .ico{font-size:25px}.btn.active{background:#08785d}.edgeZone{position:absolute;top:0;bottom:0;width:24px;z-index:110}.edgeZone.left{left:0}.edgeZone.right{right:0}.edgeHandle{position:absolute;top:45%;width:34px;height:80px;background:rgba(0,54,70,.75);font-size:34px;font-weight:950;display:flex;align-items:center;justify-content:center;z-index:120;opacity:0;pointer-events:none;transition:.15s}.edgeHandle.show{opacity:1;pointer-events:auto}.edgeHandle.left{left:0;border-radius:0 18px 18px 0}.edgeHandle.right{right:0;border-radius:18px 0 0 18px}.drawer{position:absolute;top:84px;bottom:94px;width:min(86vw,430px);z-index:220;border-radius:24px;background:linear-gradient(180deg,rgba(12,168,192,.96),rgba(0,89,119,.96));box-shadow:0 20px 55px rgba(0,0,0,.35);padding:24px;overflow:auto;transition:.22s}.drawer.right{right:10px;transform:translateX(115%)}.drawer.left{left:10px;transform:translateX(-115%)}.drawer.open{transform:translateX(0)}.drawer h2{margin:0 0 22px;font-size:28px}.close{position:absolute;right:18px;top:18px;width:48px;height:48px;border:0;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;font-size:34px}.listItem{display:grid;grid-template-columns:48px 1fr 24px;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.14);touch-action:manipulation}.num{width:44px;height:44px;border-radius:50%;background:#111;border:2px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-weight:950}.itemName{font-size:23px;font-weight:950}.itemMeta{font-size:15px;color:#d9f6ff}.wide{width:100%;border:0;border-radius:16px;background:rgba(255,255,255,.2);color:#fff;font-size:20px;font-weight:950;padding:16px;margin-top:16px}.sheetMask{position:absolute;inset:0;background:rgba(0,0,0,.48);z-index:290;display:none}.sheetMask.open{display:block}.sheet{position:absolute;left:0;right:0;bottom:0;max-height:82dvh;overflow:auto;background:#fff;color:#223;border-radius:28px 28px 0 0;padding:26px 18px calc(env(safe-area-inset-bottom) + 22px);z-index:300;display:none}.sheet.open{display:block}.sheet h2{margin:0 0 18px;font-size:28px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:16px;font-weight:950;color:#445}input,select,textarea{width:100%;border:1px solid #d7e3e7;border-radius:12px;background:#f6fbfd;color:#123;font-size:18px;padding:13px}textarea{min-height:82px}.save{grid-column:1/-1;border:0;border-radius:16px;background:#1266dd;color:#fff;padding:16px;font-size:20px;font-weight:950}.danger{border:0;background:none;color:#e9253b;font-weight:950;font-size:18px;margin-top:18px}.hint{grid-column:1/-1;color:#526;line-height:1.45}.sideView{display:none;width:100%;height:100%;border-radius:22px;background:linear-gradient(180deg,#eaf9fb,#fff);color:#123;padding:18px}.sideView.active{display:block}.sideCourt{position:relative;height:100%;border-bottom:8px solid #f6a24e}.sideNet{position:absolute;left:48%;bottom:18%;width:10px;height:46%;background:#222}.sideNet:before{content:"ネット 2.0m";position:absolute;left:-54px;top:-28px;color:#06495b;font-weight:950}.sidePlayer{position:absolute;bottom:18%;width:42px;height:98px;background:#0b526a;border-radius:22px 22px 8px 8px}.sidePlayer:after{content:attr(data-name);position:absolute;top:-24px;left:-18px;white-space:nowrap;font-weight:950}.hidden{display:none!important}
</style>

<body>
<div class="app">
  <div class="topbar"><button class="pill" id="teamBtn">A</button><button class="pill scenePill" id="sceneBtn">サーブレシーブ ▼</button><button class="pill" id="playersBtn">選手</button></div>
  <div class="viewSwitch"><button class="seg active" id="topViewBtn">トップビュー</button><button class="seg" id="sideViewBtn">サイドビュー</button></div>
  <div class="stage" id="stage">
    <div class="courtShell" id="courtShell">
      <div class="court" id="court"><div class="courtLabel">相手コート</div><div class="attack top"></div><div class="attack bottom"></div><div class="netLine"></div><div class="netGrid"></div></div>
      <div class="sideView" id="sideView"><div class="sideCourt"><div class="sideNet"></div><div class="sidePlayer" style="left:62%;height:92px" data-name="セッター"></div><div class="sidePlayer" style="left:25%;height:110px" data-name="レフト"></div></div></div>
    </div>
    <div class="edgeZone left" id="leftZone"></div><div class="edgeZone right" id="rightZone"></div><button class="edgeHandle left" id="leftHandle">‹</button><button class="edgeHandle right" id="rightHandle">›</button>
  </div>
  <div class="bottom"><button class="btn" id="undoBtn"><span class="ico">↶</span>UNDO</button><button class="btn active" id="areaBtn"><span class="ico">◌</span>範囲</button><button class="btn" id="swapBtn"><span class="ico">⇄</span>交代</button><button class="btn" id="addSceneBtn"><span class="ico">＋</span>シーン</button><button class="btn" id="resetBtn"><span class="ico">⌫</span>リセット</button></div>
  <div class="drawer left" id="teamDrawer"><button class="close" data-close>×</button><h2>チーム</h2><div id="teamList"></div><button class="wide" id="addTeamBtn">＋ チーム追加</button></div>
  <div class="drawer right" id="playersDrawer"><button class="close" data-close>×</button><h2>選手一覧</h2><div id="playerList"></div><button class="wide" id="addPlayerBtn">＋ 選手追加</button><button class="wide" id="ballToggleBtn">ボール：モルテン風</button></div>
  <div class="drawer right" id="sceneDrawer"><button class="close" data-close>×</button><h2>シーン</h2><div id="sceneList"></div><button class="wide" id="newSceneBtn">＋ シーン追加</button></div>
  <div class="sheetMask" id="mask"></div>
  <div class="sheet" id="editSheet"><h2>選手情報</h2><input type="hidden" id="editId"><div class="form"><div class="field"><label>ニックネーム</label><input id="nick"></div><div class="field"><label>性別</label><select id="gender"><option>未設定</option><option>男</option><option>女</option></select></div><div class="field"><label>学年</label><select id="grade"><option>1年</option><option>2年</option><option>3年</option><option selected>4年</option><option>5年</option><option>6年</option></select></div><div class="field"><label>生年月日</label><input id="birth" type="date"></div><div class="field"><label>身長</label><select id="height"></select></div><div class="field"><label>ポジション</label><select id="position"></select></div><div class="field full"><label>コーチ専用メモ</label><textarea id="memo"></textarea></div><div class="hint" id="growthHint"></div><button class="save" id="savePlayerBtn">保存</button></div><button class="danger" id="deletePlayerBtn">選手を削除</button></div>
</div>
<script>
(function(){
'use strict';
const $=s=>document.querySelector(s), clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const KEY='vboard_rc3_20260703';
const POS=[{id:'S',label:'セッター',short:'S'},{id:'L',label:'レフト',short:'L'},{id:'C',label:'センター',short:'C'},{id:'R',label:'ライト',short:'R'},{id:'BL',label:'Bレフト',short:'BL'},{id:'BR',label:'Bライト',short:'BR'}];
const order=['S','L','C','R','BL','BR'];
const posLabel=id=>(POS.find(p=>p.id===id)||{}).label||id;
const uid=()=>Math.random().toString(36).slice(2,9);
const defaultSelf={S:[50,56],L:[25,66],C:[50,72],R:[75,66],BL:[34,86],BR:[66,86]};
const defaultOpp={BR:[30,17],BL:[70,17],R:[25,32],C:[50,32],L:[75,32],S:[50,45]};
const avgH={男:{6:116.5,7:122.5,8:128.1,9:133.5,10:138.9,11:145.2,12:152.1},女:{6:115.6,7:121.7,8:127.3,9:133.4,10:140.1,11:146.8,12:151.9}};
function makePlayers(){return order.map((p,i)=>({id:uid(),num:i+1,nick:'',gender:'未設定',grade:'4年',birth:'',height:135,pos:p,memo:''}))}
function makeScene(name,players){return {id:uid(),name,ball:{x:50,y:50},self:players.map(p=>({id:p.id,x:defaultSelf[p.pos][0],y:defaultSelf[p.pos][1],area:{w:106,h:106,rot:0}})),opp:POS.map(p=>({id:'opp-'+p.id,pos:p.id,x:defaultOpp[p.id][0],y:defaultOpp[p.id][1]}))}}
function initState(){const players=makePlayers();return {teamIndex:0,sceneIndex:0,ball:'molten',teams:[{name:'A',players,scenes:[makeScene('サーブレシーブ',players),makeScene('相手レフト',players),makeScene('チャンス',players)]}]}}
let state;try{state=JSON.parse(localStorage.getItem(KEY))||initState()}catch(e){state=initState()}
let selected=null, drag=null, longTimer=null, longFired=false, showAreas=true, swapFirst=null, view='top';
const court=$('#court');
function team(){return state.teams[state.teamIndex]||state.teams[0]}
function scene(){return team().scenes[state.sceneIndex]||team().scenes[0]}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function pctToPx(x,y){const r=court.getBoundingClientRect();return {x:r.width*x/100,y:r.height*y/100,w:r.width,h:r.height}}
function pxToPct(clientX,clientY){const r=court.getBoundingClientRect();return {x:clamp((clientX-r.left)/r.width*100,0,100),y:clamp((clientY-r.top)/r.height*100,0,100)}}
function setText(el,text,max,min){el.textContent=text||'';let size=max;el.style.fontSize=size+'px';while(el.scrollWidth>el.clientWidth&&size>min){size-=1;el.style.fontSize=size+'px'}}
function render(){save();$('#teamBtn').textContent=team().name.slice(0,2);$('#sceneBtn').textContent=scene().name+' ▼';$('#ballToggleBtn').textContent='ボール：'+(state.ball==='molten'?'モルテン風':'ミカサ風');renderCourt();renderLists()}
function renderCourt(){court.querySelectorAll('.marker,.area,.handle,.ball').forEach(n=>n.remove());const sc=scene(); if(showAreas){sc.self.forEach(drawArea)} sc.opp.forEach(o=>drawMarker({id:o.id,type:'opp',x:o.x,y:o.y,main:posLabel(o.pos),sub:''})); sc.self.forEach(s=>{const p=team().players.find(x=>x.id===s.id); if(!p)return; drawMarker({id:s.id,type:'self',x:s.x,y:s.y,main:p.nick||posLabel(p.pos),sub:p.nick?posLabel(p.pos):''})}); drawBall(sc.ball); if(selected) drawHandles();}
function drawArea(sp){const a=sp.area||{w:106,h:106,rot:0};const c=pctToPx(sp.x,sp.y);const d=document.createElement('div');d.className='area '+(selected===sp.id?'selected':'');d.style.left=c.x+'px';d.style.top=c.y+'px';d.style.width=a.w+'px';d.style.height=a.h+'px';d.style.setProperty('--rot',(a.rot||0)+'deg');court.appendChild(d)}
function drawMarker(m){const p=pctToPx(m.x,m.y);const el=document.createElement('div');el.className='marker '+(m.type==='opp'?'opp ':'')+(m.sub?'hasName':'noName')+(selected===m.id?' selected':'');el.dataset.id=m.id;el.dataset.type=m.type;el.style.left=p.x+'px';el.style.top=p.y+'px';const main=document.createElement('div');main.className='main';const sub=document.createElement('div');sub.className='sub';el.append(main,sub);court.appendChild(el);setText(main,m.main,m.type==='opp'?15:18,8);if(m.sub)setText(sub,m.sub,11,7);el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();longFired=false;longTimer=setTimeout(()=>{longTimer=null;longFired=true;if(m.type==='self')openEdit(m.id)},560);startDrag(e,m.type,m.id)});}
function drawBall(b){const p=pctToPx(b.x,b.y);const el=document.createElement('div');el.className='ball '+(state.ball==='mikasa'?'mikasa':'');el.dataset.brand=state.ball==='molten'?'molten':'MIKASA';el.style.left=p.x+'px';el.style.top=p.y+'px';el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();startDrag(e,'ball','ball')});court.appendChild(el)}
function drawHandles(){const sp=scene().self.find(x=>x.id===selected);if(!sp)return;const a=sp.area||{w:106,h:106,rot:0};const c=pctToPx(sp.x,sp.y);const pts={right:[c.x+a.w/2,c.y],bottom:[c.x,c.y+a.h/2],scale:[c.x+a.w/2*.72,c.y+a.h/2*.72],rotate:[c.x+a.w/2*.80,c.y-a.h/2*.80]};Object.entries(pts).forEach(([k,v])=>{const h=document.createElement('div');h.className='handle '+(k==='rotate'?'rotate':'');h.dataset.kind=k;h.style.left=v[0]+'px';h.style.top=v[1]+'px';h.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();startDrag(e,'handle',k)});court.appendChild(h)})}
function startDrag(e,type,id){const p=pxToPct(e.clientX,e.clientY);drag={type,id,start:p,last:p,moved:false,pointerId:e.pointerId};try{e.currentTarget.setPointerCapture(e.pointerId)}catch(err){}}
function onMove(e){if(!drag)return;const p=pxToPct(e.clientX,e.clientY);const dx=p.x-drag.last.x,dy=p.y-drag.last.y;if(Math.abs(p.x-drag.start.x)+Math.abs(p.y-drag.start.y)>0.8){drag.moved=true;if(longTimer){clearTimeout(longTimer);longTimer=null}};
 if(drag.type==='self'){const s=scene().self.find(x=>x.id===drag.id);if(s){s.x=clamp(s.x+dx,6,94);s.y=clamp(s.y+dy,52,95)}}
 if(drag.type==='opp'){const o=scene().opp.find(x=>x.id===drag.id);if(o){o.x=clamp(o.x+dx,6,94);o.y=clamp(o.y+dy,5,49)}}
 if(drag.type==='ball'){scene().ball.x=p.x;scene().ball.y=p.y}
 if(drag.type==='handle'&&selected){const s=scene().self.find(x=>x.id===selected);if(s){const a=s.area=s.area||{w:106,h:106,rot:0};const c=pctToPx(s.x,s.y);const r=court.getBoundingClientRect();const px={x:(p.x/100)*r.width,y:(p.y/100)*r.height};if(drag.id==='right')a.w=clamp(Math.abs(px.x-c.x)*2,70,220);if(drag.id==='bottom')a.h=clamp(Math.abs(px.y-c.y)*2,70,220);if(drag.id==='scale'){const d=clamp(Math.max(Math.abs(px.x-c.x),Math.abs(px.y-c.y))*2,70,220);a.w=d;a.h=d}if(drag.id==='rotate')a.rot=Math.atan2(px.y-c.y,px.x-c.x)*180/Math.PI}}
 drag.last=p;renderCourt()}
function onUp(e){if(!drag)return;const was=drag;drag=null;if(longTimer){clearTimeout(longTimer);longTimer=null}if(!was.moved&&!longFired){if(was.type==='self'||was.type==='opp')tapMarker(was.id,was.type)}if(was.moved)save();longFired=false}
document.addEventListener('pointermove',onMove,{passive:false});document.addEventListener('pointerup',onUp);document.addEventListener('pointercancel',onUp);
court.addEventListener('pointerdown',e=>{if(e.target===court){selected=null;swapFirst=null;$('#swapBtn').classList.remove('active');renderCourt()}});
function tapMarker(id,type){if(swapFirst){if(type==='self'&&swapFirst!==id){swapPlayers(swapFirst,id);swapFirst=null;$('#swapBtn').classList.remove('active');render()}return}selected=selected===id?null:id;renderCourt()}
function renderLists(){const pl=$('#playerList');pl.innerHTML='';[...team().players].sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos)).forEach((p,i)=>{const d=document.createElement('div');d.className='listItem';d.innerHTML=`<div class="num">${i+1}</div><div><div class="itemName">${p.nick||posLabel(p.pos)}</div><div class="itemMeta">${posLabel(p.pos)} / ${p.grade} / ${p.height}cm</div></div><div>›</div>`;d.onclick=()=>openEdit(p.id);pl.appendChild(d)});
 const tl=$('#teamList');tl.innerHTML='';state.teams.forEach((t,i)=>{const d=document.createElement('div');d.className='listItem';d.innerHTML=`<div class="num">${String.fromCharCode(65+i)}</div><div><div class="itemName">${t.name}</div><div class="itemMeta">${t.players.length}人</div></div><div>›</div>`;d.onclick=()=>{state.teamIndex=i;state.sceneIndex=0;selected=null;closeDrawers();render()};tl.appendChild(d)});
 const sl=$('#sceneList');sl.innerHTML='';team().scenes.forEach((s,i)=>{const d=document.createElement('div');d.className='listItem';d.innerHTML=`<div class="num">${i+1}</div><div><div class="itemName">${s.name}</div><div class="itemMeta">タップで選択 / 長押しで名前変更</div></div><div>›</div>`;let t=null,renamed=false;d.addEventListener('pointerdown',()=>{renamed=false;t=setTimeout(()=>{renamed=true;const n=prompt('シーン名',s.name);if(n){s.name=n;render()}},650)});d.addEventListener('pointerup',()=>{if(t)clearTimeout(t);if(!renamed){state.sceneIndex=i;selected=null;closeDrawers();render()}});sl.appendChild(d)})}
function openEdit(id){const p=team().players.find(x=>x.id===id);if(!p)return;$('#editId').value=id;$('#nick').value=p.nick||'';$('#gender').value=p.gender||'未設定';$('#grade').value=p.grade||'4年';$('#birth').value=p.birth||'';$('#height').value=p.height||135;$('#position').value=p.pos;$('#memo').value=p.memo||'';updateGrowth();$('#mask').classList.add('open');$('#editSheet').classList.add('open')}
function closeEdit(){$('#mask').classList.remove('open');$('#editSheet').classList.remove('open')}
function updateGrowth(){const gender=$('#gender').value,b=$('#birth').value,h=Number($('#height').value);if(!b||!avgH[gender]){$('#growthHint').textContent='生年月日と性別を入れると、年齢と平均身長との差を表示します。';return}const born=new Date(b),now=new Date();let months=(now.getFullYear()-born.getFullYear())*12+(now.getMonth()-born.getMonth());if(now.getDate()<born.getDate())months--;const y=Math.max(0,Math.floor(months/12)),m=((months%12)+12)%12;const avg=avgH[gender][String(y)];$('#growthHint').textContent=avg?`${y}歳${m}か月 / 平均身長 約${avg}cm /平均との差 ${h-avg>=0?'+':''}${(h-avg).toFixed(1)}cm`:`${y}歳${m}か月 / 平均身長データ対象外`}
function savePlayer(){const p=team().players.find(x=>x.id===$('#editId').value);if(!p)return;p.nick=$('#nick').value.trim();p.gender=$('#gender').value;p.grade=$('#grade').value;p.birth=$('#birth').value;p.height=Number($('#height').value);p.pos=$('#position').value;p.memo=$('#memo').value;closeEdit();render()}
function swapPlayers(a,b){const A=scene().self.find(x=>x.id===a),B=scene().self.find(x=>x.id===b);if(A&&B){[A.x,B.x]=[B.x,A.x];[A.y,B.y]=[B.y,A.y];[A.area,B.area]=[B.area,A.area]}}
function closeDrawers(){document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'))}
function resetScene(){const old=scene();Object.assign(old,makeScene(old.name,team().players));selected=null;render()}
for(let h=100;h<=180;h++){const o=document.createElement('option');o.value=h;o.textContent=h+'cm';if(h===135)o.selected=true;$('#height').appendChild(o)}POS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.label;$('#position').appendChild(o)});
$('#playersBtn').onclick=()=>{$('#playersDrawer').classList.add('open')};$('#teamBtn').onclick=()=>{$('#teamDrawer').classList.add('open')};$('#sceneBtn').onclick=()=>{$('#sceneDrawer').classList.add('open')};$('#addSceneBtn').onclick=()=>{$('#sceneDrawer').classList.add('open')};$('#newSceneBtn').onclick=()=>{const n=prompt('シーン名','新しいシーン');if(n){team().scenes.push(makeScene(n,team().players));state.sceneIndex=team().scenes.length-1;selected=null;render()}};
$('#addPlayerBtn').onclick=()=>{const p={id:uid(),num:team().players.length+1,nick:'',gender:'未設定',grade:'4年',birth:'',height:135,pos:'S',memo:''};team().players.push(p);team().scenes.forEach(sc=>sc.self.push({id:p.id,x:defaultSelf.S[0],y:defaultSelf.S[1],area:{w:106,h:106,rot:0}}));render();openEdit(p.id)};
$('#addTeamBtn').onclick=()=>{const n=prompt('チーム名','B');if(n){const base=initState().teams[0];base.name=n;state.teams.push(base);state.teamIndex=state.teams.length-1;state.sceneIndex=0;selected=null;render()}};
$('#ballToggleBtn').onclick=()=>{state.ball=state.ball==='molten'?'mikasa':'molten';render()};$('#areaBtn').onclick=()=>{showAreas=!showAreas;$('#areaBtn').classList.toggle('active',showAreas);renderCourt()};$('#swapBtn').onclick=()=>{swapFirst=selected;if(!swapFirst){alert('先に交代したいコート上の選手を1人タップしてください');return}$('#swapBtn').classList.add('active');alert('次に入れ替えたい選手をタップしてください')};$('#resetBtn').onclick=()=>{if(confirm('このシーンを初期配置に戻しますか？'))resetScene()};$('#undoBtn').onclick=()=>alert('Undoは次版で履歴化します');$('#savePlayerBtn').onclick=savePlayer;$('#deletePlayerBtn').onclick=()=>{const id=$('#editId').value;if(confirm('削除しますか？')){team().players=team().players.filter(p=>p.id!==id);team().scenes.forEach(sc=>sc.self=sc.self.filter(s=>s.id!==id));closeEdit();render()}};$('#mask').onclick=closeEdit;document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeDrawers);['gender','birth','height'].forEach(id=>$('#'+id).addEventListener('change',updateGrowth));
$('#topViewBtn').onclick=()=>{view='top';$('#topViewBtn').classList.add('active');$('#sideViewBtn').classList.remove('active');court.classList.remove('hidden');$('#sideView').classList.remove('active')};$('#sideViewBtn').onclick=()=>{view='side';$('#sideViewBtn').classList.add('active');$('#topViewBtn').classList.remove('active');court.classList.add('hidden');$('#sideView').classList.add('active')};
let edgeTimer;function showEdge(side){const h=side==='left'?$('#leftHandle'):$('#rightHandle');h.classList.add('show');clearTimeout(edgeTimer);edgeTimer=setTimeout(()=>h.classList.remove('show'),1300)}$('#leftZone').onclick=()=>showEdge('left');$('#rightZone').onclick=()=>showEdge('right');$('#leftHandle').onclick=()=>{$('#teamDrawer').classList.add('open')};$('#rightHandle').onclick=()=>{$('#playersDrawer').classList.add('open')};
render();
})();
</script>
</body>
