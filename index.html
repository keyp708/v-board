<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>V Board</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
:root{--teal:#13b6c9;--deep:#00445b;--deep2:#073446;--court:#f6a24e;--line:#fff;--ink:#13242a;--panel:#0a7f98;--green:#21c69a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;background:linear-gradient(180deg,#05435a,#0eb6c7);color:#fff;overflow:hidden}.app{height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 10px calc(env(safe-area-inset-bottom) + 4px)}.topbar{height:74px;display:grid;grid-template-columns:70px 1fr 86px;gap:10px;align-items:center}.pill{border:1px solid rgba(255,255,255,.28);background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.12));box-shadow:inset 0 1px rgba(255,255,255,.2),0 10px 20px rgba(0,0,0,.12);border-radius:999px;min-height:56px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px}.scenePill{font-size:30px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 18px}.viewSwitch{height:46px;display:flex;justify-content:center;gap:10px}.seg{border:0;border-radius:999px;min-width:150px;padding:10px 18px;font-size:18px;font-weight:900;color:#ffffffcc;background:rgba(255,255,255,.18)}.seg.active{background:#fff;color:#06495b}.stage{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center}.courtWrap{position:relative;width:min(92vw,520px);height:min(calc(100dvh - 230px),calc((92vw)*2));max-height:calc(100dvh - 230px);aspect-ratio:1/2;background:var(--teal);border-radius:24px;padding:10px;box-shadow:0 18px 35px rgba(0,0,0,.22),inset 0 0 0 2px rgba(255,255,255,.08)}.court{position:relative;width:100%;height:100%;background:linear-gradient(180deg,#ffc175,#f89434);border:6px solid white;border-radius:10px;overflow:hidden;touch-action:none}.court:before{content:"";position:absolute;left:0;right:0;top:50%;height:6px;background:#2b2117;box-shadow:0 -6px 0 #f7e1b8,0 6px 0 #f7e1b8;z-index:10}.netGrid{position:absolute;left:-2%;right:-2%;top:calc(50% - 12px);height:24px;background:repeating-linear-gradient(90deg,transparent 0 18px,#171717 18px 22px),repeating-linear-gradient(0deg,transparent 0 8px,#171717 8px 11px);z-index:12;opacity:.9}.attack{position:absolute;left:0;right:0;border-top:3px dashed rgba(255,255,255,.88);z-index:2}.attack.top{top:33.333%}.attack.bottom{top:66.666%}.label{position:absolute;left:16px;background:rgba(73,46,21,.82);border-radius:10px;color:#fff;font-weight:900;padding:8px 12px;z-index:15}.label.opp{top:16px}.ball{position:absolute;width:44px;height:44px;border-radius:50%;z-index:40;touch-action:none;transform:translate(-50%,-50%);filter:drop-shadow(0 18px 10px rgba(0,0,0,.35));background:conic-gradient(from 20deg,#fff 0 14%,#d7382f 14% 28%,#fff 28% 42%,#008d75 42% 56%,#fff 56% 70%,#d7382f 70% 84%,#008d75 84% 100%)}.ball.mikasa{background:conic-gradient(from 20deg,#ffe500 0 20%,#006bd6 20% 36%,#fff 36% 50%,#ffe500 50% 70%,#006bd6 70% 84%,#fff 84% 100%)}.ball:after{content:attr(data-brand);position:absolute;inset:14px 4px auto 4px;font-size:8px;color:#123;text-align:center;font-weight:900}.area{position:absolute;border:2px dotted rgba(255,255,255,.82);border-radius:50%;z-index:18;transform:translate(-50%,-50%) rotate(var(--rot,0deg));pointer-events:none}.area.selected{border:3px solid var(--green);background:rgba(33,198,154,.05);z-index:19}.handle{position:absolute;width:18px;height:18px;border-radius:50%;border:3px solid #fff;background:var(--green);z-index:80;box-shadow:0 2px 5px rgba(0,0,0,.25);touch-action:none}.handle.rotate{background:#222}.marker{position:absolute;width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#747474,#252525 70%);border:4px solid #fff;box-shadow:0 10px 12px rgba(0,0,0,.32);z-index:50;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;touch-action:none;user-select:none}.marker.opponent{background:radial-gradient(circle at 35% 25%,#8a8a8a,#555 70%);opacity:.96}.marker.selected{outline:5px solid var(--green)}.marker .main{font-weight:950;line-height:1.02;max-width:52px;white-space:nowrap;overflow:hidden;text-overflow:clip;text-align:center}.marker .sub{font-weight:900;line-height:1;max-width:52px;white-space:nowrap;text-align:center;margin-top:3px}.marker.name .main{font-size:20px}.marker.name .sub{font-size:12px}.marker.posOnly .main{font-size:17px}.marker.posOnly .sub{display:none}.marker.opponent .main{font-size:16px}.bottom{height:82px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding-top:10px}.btn{border:0;border-radius:16px;background:#06475a;color:white;font-weight:900;font-size:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 8px 16px rgba(0,0,0,.22)}.btn .ico{font-size:26px}.btn.active{background:#0a755e}.edge{position:absolute;top:46%;width:34px;height:78px;border-radius:0 18px 18px 0;background:rgba(0,54,70,.72);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;z-index:90;opacity:0;transition:.15s}.edge.show{opacity:1}.edge.left{left:0}.edge.right{right:0;border-radius:18px 0 0 18px}.drawer{position:absolute;top:82px;bottom:92px;width:min(86vw,430px);background:linear-gradient(180deg,rgba(10,169,194,.94),rgba(0,94,123,.94));z-index:200;border-radius:22px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.35);transform:translateX(120%);transition:.22s;overflow:auto}.drawer.left{left:10px;transform:translateX(-120%)}.drawer.right{right:10px}.drawer.open{transform:translateX(0)}.drawer h2{margin:0 0 20px;font-size:28px}.close{position:absolute;right:18px;top:18px;width:48px;height:48px;border-radius:50%;border:0;background:rgba(255,255,255,.18);font-size:34px;color:white}.listItem{display:grid;grid-template-columns:48px 1fr 24px;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.14)}.num{width:44px;height:44px;border-radius:50%;background:#111;border:2px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-weight:900}.itemName{font-size:23px;font-weight:900}.itemMeta{font-size:15px;color:#d9f6ff;margin-top:2px}.wide{width:100%;border:0;border-radius:16px;background:rgba(255,255,255,.2);color:#fff;font-size:20px;font-weight:900;padding:16px;margin-top:16px}.sheetMask{position:absolute;inset:0;background:rgba(0,0,0,.48);z-index:290;display:none}.sheetMask.open{display:block}.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;color:#223;border-radius:28px 28px 0 0;padding:26px 18px calc(env(safe-area-inset-bottom) + 22px);z-index:300;display:none;max-height:78dvh;overflow:auto}.sheet.open{display:block}.sheet h2{margin:0 0 18px;font-size:28px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-weight:900;color:#445;font-size:16px}input,select,textarea{width:100%;border:1px solid #d7e3e7;border-radius:12px;background:#f6fbfd;font-size:18px;padding:13px;color:#123}textarea{min-height:80px}.save{grid-column:1/-1;background:#1266dd;color:white;border:0;border-radius:16px;padding:16px;font-size:20px;font-weight:900}.danger{background:none;border:0;color:#e9253b;font-weight:900;font-size:18px;margin-top:18px}.hint{grid-column:1/-1;color:#526;line-height:1.5}.sideView{display:none;width:100%;height:100%;background:linear-gradient(180deg,#eaf9fb,#fff);border-radius:22px;padding:18px;color:#123}.sideView.active{display:block}.sideCourt{height:100%;position:relative;border-bottom:8px solid #f6a24e}.sideNet{position:absolute;left:48%;bottom:18%;width:10px;height:46%;background:#222}.sideNet:before{content:"ネット 2.0m";position:absolute;left:-54px;top:-28px;font-weight:900;color:#06495b}.sidePlayer{position:absolute;bottom:18%;width:42px;height:98px;background:#0b526a;border-radius:22px 22px 8px 8px}.sidePlayer:after{content:attr(data-name);position:absolute;top:-24px;left:-18px;white-space:nowrap;font-weight:900}.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="pill" id="teamBtn">A</button>
    <button class="pill scenePill" id="sceneBtn">サーブレシーブ ▼</button>
    <button class="pill" id="playersBtn">選手</button>
  </div>
  <div class="viewSwitch"><button class="seg active" id="topViewBtn">トップビュー</button><button class="seg" id="sideViewBtn">サイドビュー</button></div>
  <div class="stage" id="stage">
    <div class="courtWrap" id="courtWrap">
      <div class="court" id="court">
        <div class="label opp">相手コート</div><div class="attack top"></div><div class="attack bottom"></div><div class="netGrid"></div>
      </div>
      <div class="sideView" id="sideView"><div class="sideCourt"><div class="sideNet"></div><div class="sidePlayer" style="left:62%;height:92px" data-name="セッター"></div><div class="sidePlayer" style="left:25%;height:110px" data-name="レフト"></div></div></div>
    </div>
    <button class="edge left" id="leftEdge">‹</button><button class="edge right" id="rightEdge">›</button>
  </div>
  <div class="bottom"><button class="btn" id="undoBtn"><span class="ico">↶</span>UNDO</button><button class="btn" id="areaBtn"><span class="ico">◌</span>範囲</button><button class="btn" id="swapBtn"><span class="ico">⇄</span>交代</button><button class="btn" id="addSceneBtn"><span class="ico">＋</span>シーン</button><button class="btn" id="resetBtn"><span class="ico">⌫</span>リセット</button></div>
  <div class="drawer right" id="playersDrawer"><button class="close" data-close>×</button><h2>選手一覧</h2><div id="playerList"></div><button class="wide" id="addPlayerBtn">＋ 選手追加</button><button class="wide" id="ballToggleBtn">ボール：モルテン風</button></div>
  <div class="drawer left" id="teamDrawer"><button class="close" data-close>×</button><h2>チーム管理</h2><div id="teamList"></div><button class="wide" id="addTeamBtn">＋ チーム追加</button></div>
  <div class="drawer right" id="sceneDrawer"><button class="close" data-close>×</button><h2>シーン</h2><div id="sceneList"></div><button class="wide" id="newSceneBtn">＋ シーン追加</button></div>
  <div class="sheetMask" id="mask"></div>
  <div class="sheet" id="editSheet"><h2>選手情報</h2><div class="form">
    <input type="hidden" id="editId"><div class="field"><label>ニックネーム</label><input id="nick" autocomplete="off"></div><div class="field"><label>性別</label><select id="gender"><option>未設定</option><option>男</option><option>女</option></select></div>
    <div class="field"><label>学年</label><select id="grade"><option>1年</option><option>2年</option><option>3年</option><option selected>4年</option><option>5年</option><option>6年</option></select></div><div class="field"><label>生年月日</label><input id="birth" type="date"></div>
    <div class="field"><label>身長</label><select id="height"></select></div><div class="field"><label>ポジション</label><select id="position"></select></div>
    <div class="hint" id="growthHint">生年月日と性別を入れると、年齢と平均身長との差を表示します。</div>
    <div class="field full"><label>コーチ専用メモ</label><textarea id="memo"></textarea></div><button class="save" id="savePlayerBtn">保存</button></div><button class="danger" id="deletePlayerBtn">選手を削除</button></div>
</div>
<script>
(() => {
const KEY='vboard-sprint20-rc2';
const POS=[
  {id:'S',label:'セッター',short:'S'}, {id:'L',label:'レフト',short:'LF'}, {id:'C',label:'センター',short:'C'}, {id:'R',label:'ライト',short:'RF'}, {id:'BL',label:'Bレフト',short:'BL'}, {id:'BR',label:'Bライト',short:'BR'}
];
const defaultSelf={S:[50,58],L:[25,66],C:[50,72],R:[75,66],BL:[34,84],BR:[66,84]};
const defaultOpp={BR:[34,18],BL:[66,18],R:[25,34],C:[50,40],L:[75,34],S:[50,48]};
const avgH={男:{'6':116,'7':122,'8':128,'9':134,'10':139,'11':145,'12':152},女:{'6':115,'7':121,'8':127,'9':133,'10':140,'11':147,'12':151}};
let state=load(); let selected=null; let swapFirst=null; let showAreas=true; let longTimer=null; let drag=null; let view='top';
const $=s=>document.querySelector(s); const court=$('#court');
function load(){try{const saved=JSON.parse(localStorage.getItem(KEY)); if(saved) return saved;}catch(e){} return initState();}
function initState(){const players=POS.map((p,i)=>({id:uid(),num:i+1,nick:'',gender:'未設定',grade:'4年',birth:'',height:135,pos:p.id,memo:''}));return {teamIndex:0,sceneIndex:0,ball:'molten',teams:[{name:'A',players,scenes:[makeScene('サーブレシーブ',players)]}]};}
function makeScene(name,players){return {id:uid(),name,ball:{x:50,y:50},self:players.map(p=>({id:p.id,x:defaultSelf[p.pos][0],y:defaultSelf[p.pos][1],area:{rx:8,ry:8,rot:0}})),opp:POS.map(p=>({id:'opp-'+p.id,pos:p.id,x:defaultOpp[p.id][0],y:defaultOpp[p.id][1]}))};}
function uid(){return Math.random().toString(36).slice(2,9)}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function team(){return state.teams[state.teamIndex]} function scene(){return team().scenes[state.sceneIndex]}
function posLabel(id){return (POS.find(p=>p.id===id)||{}).label||id}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function pctFromEvent(e){const r=court.getBoundingClientRect();return {x:clamp((e.clientX-r.left)/r.width*100,0,100),y:clamp((e.clientY-r.top)/r.height*100,0,100)}}
function autoText(el,text,max=16,min=9){el.textContent=text; let size=max; el.style.fontSize=size+'px'; requestAnimationFrame(()=>{while(el.scrollWidth>el.clientWidth && size>min){size--;el.style.fontSize=size+'px'}})}
function render(){save(); $('#teamBtn').textContent=team().name.slice(0,2); $('#sceneBtn').textContent=scene().name+' ▼'; $('#ballToggleBtn').textContent='ボール：'+(state.ball==='molten'?'モルテン風':'ミカサ風'); renderCourt(); renderLists();}
function renderCourt(){court.querySelectorAll('.marker,.area,.handle,.ball').forEach(n=>n.remove()); const sc=scene();
  sc.opp.forEach(o=>addMarker({type:'opp',id:o.id,x:o.x,y:o.y,main:posLabel(o.pos),sub:'',pos:o.pos}));
  sc.self.forEach(sp=>{const p=team().players.find(x=>x.id===sp.id); if(!p) return; addArea(sp); addMarker({type:'self',id:p.id,x:sp.x,y:sp.y,main:p.nick||posLabel(p.pos),sub:p.nick?posLabel(p.pos):'',pos:p.pos});});
  const b=document.createElement('div'); b.className='ball '+(state.ball==='mikasa'?'mikasa':''); b.dataset.brand=state.ball==='molten'?'molten':'MIKASA'; b.style.left=sc.ball.x+'%'; b.style.top=sc.ball.y+'%'; b.addEventListener('pointerdown',e=>startDrag(e,'ball','ball')); court.appendChild(b);
  if(selected) addHandles(); }
function addArea(sp){if(!showAreas) return; const a=sp.area||{rx:8,ry:8,rot:0}; const d=document.createElement('div'); d.className='area '+(selected===sp.id?'selected':''); d.style.left=sp.x+'%'; d.style.top=sp.y+'%'; d.style.width=(a.rx*2)+'%'; d.style.height=(a.ry*2)+'%'; d.style.setProperty('--rot',(a.rot||0)+'deg'); court.appendChild(d);}
function addMarker(m){const el=document.createElement('div'); el.className='marker '+(m.type==='opp'?'opponent ':'')+(m.sub?'name':'posOnly')+(selected===m.id?' selected':''); el.dataset.id=m.id; el.dataset.type=m.type; el.style.left=m.x+'%'; el.style.top=m.y+'%'; const main=document.createElement('div'); main.className='main'; const sub=document.createElement('div'); sub.className='sub'; el.append(main,sub); court.appendChild(el); autoText(main,m.main,m.type==='opp'?15:19,8); if(m.sub) autoText(sub,m.sub,11,7);
 el.addEventListener('pointerdown',e=>{e.stopPropagation(); longTimer=setTimeout(()=>{longTimer=null;if(m.type==='self') openEdit(m.id);},520); startDrag(e,m.type,m.id);}); el.addEventListener('pointerup',()=>{if(longTimer){clearTimeout(longTimer); longTimer=null; markerTap(m.id,m.type);}}); el.addEventListener('pointercancel',()=>{if(longTimer) clearTimeout(longTimer);});}
function markerTap(id,type){ if(swapFirst){ if(type==='self'&&swapFirst!==id){swapPlayers(swapFirst,id); swapFirst=null; $('#swapBtn').classList.remove('active'); render();} return;} selected= selected===id ? null : id; render(); }
function addHandles(){const sp=scene().self.find(x=>x.id===selected); if(!sp) return; const a=sp.area; [['right',sp.x+a.rx,sp.y],['bottom',sp.x,sp.y+a.ry],['scale',sp.x+a.rx*.7,sp.y+a.ry*.7],['rotate',sp.x+a.rx*.85,sp.y-a.ry*.85]].forEach(([kind,x,y])=>{const h=document.createElement('div'); h.className='handle '+(kind==='rotate'?'rotate':''); h.style.left=x+'%'; h.style.top=y+'%'; h.addEventListener('pointerdown',e=>startDrag(e,'handle',kind)); court.appendChild(h);});}
function startDrag(e,type,id){e.preventDefault(); if(longTimer && type!=='self') {clearTimeout(longTimer);longTimer=null} const p=pctFromEvent(e); drag={type,id,start:p,last:p,moved:false}; court.setPointerCapture?.(e.pointerId);}
function onMove(e){if(!drag)return; const p=pctFromEvent(e); const dx=p.x-drag.last.x,dy=p.y-drag.last.y; if(Math.abs(p.x-drag.start.x)+Math.abs(p.y-drag.start.y)>1.2){drag.moved=true;if(longTimer){clearTimeout(longTimer);longTimer=null}}
 if(drag.type==='self'){const sp=scene().self.find(x=>x.id===drag.id); if(sp){sp.x=clamp(sp.x+dx,6,94);sp.y=clamp(sp.y+dy,52,95);}}
 if(drag.type==='opp'){const op=scene().opp.find(x=>x.id===drag.id); if(op){op.x=clamp(op.x+dx,6,94);op.y=clamp(op.y+dy,5,49);}}
 if(drag.type==='ball'){scene().ball.x=p.x;scene().ball.y=p.y;}
 if(drag.type==='handle'&&selected){const sp=scene().self.find(x=>x.id===selected); if(sp){if(drag.id==='right')sp.area.rx=clamp(Math.abs(p.x-sp.x),6,28); if(drag.id==='bottom')sp.area.ry=clamp(Math.abs(p.y-sp.y),6,20); if(drag.id==='scale'){const r=clamp(Math.max(Math.abs(p.x-sp.x),Math.abs(p.y-sp.y)),6,24);sp.area.rx=r;sp.area.ry=r;} if(drag.id==='rotate')sp.area.rot=Math.atan2(p.y-sp.y,p.x-sp.x)*180/Math.PI;}}
 drag.last=p; renderCourt(); }
function onUp(){ if(drag){ if(drag.moved) save(); drag=null;} }
court.addEventListener('pointermove',onMove); court.addEventListener('pointerup',onUp); court.addEventListener('pointercancel',onUp); court.addEventListener('pointerdown',e=>{ if(e.target===court){selected=null; render();}});
function openEdit(id){const p=team().players.find(x=>x.id===id); if(!p)return; $('#editId').value=id; $('#nick').value=p.nick||''; $('#gender').value=p.gender||'未設定'; $('#grade').value=p.grade||'4年'; $('#birth').value=p.birth||''; $('#height').value=p.height||135; $('#position').value=p.pos; $('#memo').value=p.memo||''; updateGrowth(); $('#mask').classList.add('open'); $('#editSheet').classList.add('open');}
function closeEdit(){ $('#mask').classList.remove('open'); $('#editSheet').classList.remove('open');}
function updateGrowth(){const gender=$('#gender').value,b=$('#birth').value,h=Number($('#height').value); if(!b||!avgH[gender]){$('#growthHint').textContent='生年月日と性別を入れると、年齢と平均身長との差を表示します。';return;} const born=new Date(b),now=new Date(); let months=(now.getFullYear()-born.getFullYear())*12+(now.getMonth()-born.getMonth()); if(now.getDate()<born.getDate())months--; const y=Math.max(0,Math.floor(months/12)),m=((months%12)+12)%12; const avg=avgH[gender][String(y)]; $('#growthHint').textContent= avg?`${y}歳${m}か月 / 平均身長 約${avg}cm /平均との差 ${h-avg>=0?'+':''}${(h-avg).toFixed(1)}cm`:`${y}歳${m}か月 / 平均身長データ対象外`;}
function savePlayer(){const id=$('#editId').value; let p=team().players.find(x=>x.id===id); if(!p)return; p.nick=$('#nick').value.trim(); p.gender=$('#gender').value; p.grade=$('#grade').value; p.birth=$('#birth').value; p.height=Number($('#height').value); p.pos=$('#position').value; p.memo=$('#memo').value; const sp=scene().self.find(x=>x.id===id); if(sp) sp.area=sp.area||{rx:8,ry:8,rot:0}; closeEdit(); render();}
function renderLists(){const pl=$('#playerList'); pl.innerHTML=''; const order=['S','L','C','R','BL','BR']; [...team().players].sort((a,b)=>order.indexOf(a.pos)-order.indexOf(b.pos)).forEach((p,i)=>{const d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="num">${i+1}</div><div><div class="itemName">${p.nick||posLabel(p.pos)}</div><div class="itemMeta">${posLabel(p.pos)} / ${p.grade} / ${p.height}cm</div></div><div>›</div>`; d.onclick=()=>openEdit(p.id); pl.appendChild(d);});
 const tl=$('#teamList'); tl.innerHTML=''; state.teams.forEach((t,i)=>{const d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="num">${String.fromCharCode(65+i)}</div><div><div class="itemName">${t.name}</div><div class="itemMeta">${t.players.length}人</div></div><div>›</div>`; d.onclick=()=>{state.teamIndex=i;state.sceneIndex=0;closeDrawers();render()}; tl.appendChild(d)});
 const sl=$('#sceneList'); sl.innerHTML=''; team().scenes.forEach((s,i)=>{const d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="num">${i+1}</div><div><div class="itemName">${s.name}</div><div class="itemMeta">タップで選択 / 長押しで名前変更</div></div><div>›</div>`; let timer; d.onpointerdown=()=>timer=setTimeout(()=>{const n=prompt('シーン名',s.name); if(n){s.name=n;render()}},600); d.onpointerup=()=>{if(timer){clearTimeout(timer);state.sceneIndex=i;closeDrawers();render();}}; sl.appendChild(d)});}
function swapPlayers(a,b){const A=scene().self.find(x=>x.id===a),B=scene().self.find(x=>x.id===b); if(A&&B){[A.x,B.x]=[B.x,A.x];[A.y,B.y]=[B.y,A.y];[A.area,B.area]=[B.area,A.area];}}
function closeDrawers(){document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open'));}
function resetScene(){const old=scene(); const fresh=makeScene(old.name,team().players); Object.assign(old,fresh); selected=null; render();}
for(let h=100;h<=180;h++){const o=document.createElement('option');o.value=h;o.textContent=h+'cm';if(h===135)o.selected=true;$('#height').appendChild(o)} POS.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.label;$('#position').appendChild(o)});
$('#playersBtn').onclick=()=>{$('#playersDrawer').classList.add('open')}; $('#teamBtn').onclick=()=>{$('#teamDrawer').classList.add('open')}; $('#sceneBtn').onclick=()=>{$('#sceneDrawer').classList.add('open')}; $('#addSceneBtn').onclick=()=>{$('#sceneDrawer').classList.add('open')}; $('#newSceneBtn').onclick=()=>{const n=prompt('シーン名','新しいシーン'); if(n){team().scenes.push(makeScene(n,team().players));state.sceneIndex=team().scenes.length-1;render();}};
$('#addPlayerBtn').onclick=()=>{const p={id:uid(),num:team().players.length+1,nick:'',gender:'未設定',grade:'4年',birth:'',height:135,pos:'S',memo:''}; team().players.push(p); team().scenes.forEach(sc=>sc.self.push({id:p.id,x:defaultSelf.S[0],y:defaultSelf.S[1],area:{rx:8,ry:8,rot:0}})); render(); openEdit(p.id);};
$('#addTeamBtn').onclick=()=>{const n=prompt('チーム名','B'); if(n){const base=initState().teams[0]; base.name=n; state.teams.push(base); state.teamIndex=state.teams.length-1; state.sceneIndex=0; render();}};
$('#ballToggleBtn').onclick=()=>{state.ball=state.ball==='molten'?'mikasa':'molten';render();}; $('#areaBtn').onclick=()=>{showAreas=!showAreas;$('#areaBtn').classList.toggle('active',showAreas);renderCourt();}; $('#swapBtn').onclick=()=>{swapFirst=null; $('#swapBtn').classList.toggle('active'); alert('交代する2人を順番にタップしてください');}; $('#resetBtn').onclick=()=>{if(confirm('このシーンを初期配置に戻しますか？'))resetScene();}; $('#undoBtn').onclick=()=>alert('Undoは次版で履歴化します');
$('#savePlayerBtn').onclick=savePlayer; $('#deletePlayerBtn').onclick=()=>{const id=$('#editId').value;if(confirm('削除しますか？')){team().players=team().players.filter(p=>p.id!==id);team().scenes.forEach(sc=>sc.self=sc.self.filter(s=>s.id!==id));closeEdit();render();}}; $('#mask').onclick=closeEdit; document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeDrawers);
['gender','birth','height'].forEach(id=>$('#'+id).addEventListener('change',updateGrowth));
$('#topViewBtn').onclick=()=>{view='top';$('#topViewBtn').classList.add('active');$('#sideViewBtn').classList.remove('active');court.classList.remove('hidden');$('#sideView').classList.remove('active')}; $('#sideViewBtn').onclick=()=>{view='side';$('#sideViewBtn').classList.add('active');$('#topViewBtn').classList.remove('active');court.classList.add('hidden');$('#sideView').classList.add('active')};
let edgeTimer; $('#stage').addEventListener('pointermove',e=>{const r=$('#stage').getBoundingClientRect(); const nearL=e.clientX-r.left<24, nearR=r.right-e.clientX<24; $('#leftEdge').classList.toggle('show',nearL); $('#rightEdge').classList.toggle('show',nearR); clearTimeout(edgeTimer); edgeTimer=setTimeout(()=>{$('#leftEdge').classList.remove('show');$('#rightEdge').classList.remove('show')},1600);}); $('#leftEdge').onclick=()=>$('#teamDrawer').classList.add('open'); $('#rightEdge').onclick=()=>$('#playersDrawer').classList.add('open');
render();
})();
</script>
</body>
</html>
