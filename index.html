<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#063b55" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>V Board</title>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button class="icon-btn" id="teamBtn" aria-label="team">A</button>
      <button class="scene-pill" id="sceneBtn"><span id="sceneName">サーブレシーブ</span><span>▼</span></button>
      <button class="icon-btn text" id="playersBtn">選手</button>
    </header>

    <main class="board-wrap" id="boardWrap">
      <section class="court-shell" id="courtShell">
        <div class="court" id="court">
          <div class="court-label opponent">相手コート</div>
          <div class="court-label home">自分コート</div>
          <div class="line net-line"></div>
          <div class="net"></div>
          <div class="line attack-line top"></div>
          <div class="line attack-line bottom"></div>
          <div id="zones"></div>
          <div id="tokens"></div>
          <div id="ball" class="ball" aria-label="ball"></div>
        </div>
      </section>
      <div class="tool-row">
        <button id="undoBtn">↶<small>UNDO</small></button>
        <button id="ballBtn">●<small>ボール</small></button>
        <button id="rangeBtn">◌<small>範囲</small></button>
        <button id="sceneAddBtn">＋<small>シーン</small></button>
        <button id="resetBtn">⌫<small>リセット</small></button>
      </div>
      <p class="hint">選手・ボールをドラッグ / 長押しで選手編集 / 範囲の白い点で調整</p>
    </main>

    <aside class="sheet scene-sheet" id="sceneSheet">
      <div class="sheet-head"><strong>シーン</strong><button class="close" data-close="sceneSheet">×</button></div>
      <div id="sceneList" class="list"></div>
      <div class="sheet-actions"><button id="newSceneBtn">＋ シーン追加</button></div>
    </aside>

    <aside class="sheet player-sheet" id="playerSheet">
      <div class="sheet-head"><strong>選手一覧</strong><button class="close" data-close="playerSheet">×</button></div>
      <div id="playerList" class="player-list"></div>
      <div class="sheet-actions"><button id="addPlayerBtn">＋ 選手追加</button></div>
    </aside>

    <aside class="sheet team-sheet" id="teamSheet">
      <div class="sheet-head"><strong>チーム</strong><button class="close" data-close="teamSheet">×</button></div>
      <div id="teamList" class="list"></div>
      <div class="sheet-actions"><button id="addTeamBtn">＋ チーム追加</button></div>
    </aside>

    <div class="modal-backdrop" id="editBackdrop"></div>
    <section class="bottom-sheet" id="editSheet">
      <div class="handle"></div>
      <h2 id="editTitle">選手編集</h2>
      <div class="tabs"><button class="active" data-tab="public">表情報</button><button data-tab="coach">コーチ専用</button></div>
      <div class="form-grid" id="publicTab">
        <label>ニックネーム<input id="editNick" /></label>
        <label>背番号<input id="editNo" /></label>
        <label>学年<input id="editGrade" placeholder="4年" /></label>
        <label>身長<input id="editHeight" placeholder="155cm" /></label>
        <label>性別<select id="editGender"><option>未設定</option><option>女</option><option>男</option></select></label>
        <label>ポジション<input id="editPos" placeholder="S/OH/MB" /></label>
      </div>
      <div class="form-grid hidden" id="coachTab">
        <label>性格メモ<textarea id="editPersonality" placeholder="向上心・積極性・協調性など"></textarea></label>
        <label>コーチメモ<textarea id="editCoach" placeholder="監督・コーチだけが見るメモ"></textarea></label>
      </div>
      <div class="sheet-actions"><button id="cancelEdit">閉じる</button><button class="primary" id="saveEdit">保存</button></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
