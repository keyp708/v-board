<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>V Board</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="teamBtn" class="pill team-pill">A</button>
      <button id="sceneBtn" class="pill scene-pill">サーブレシーブ ▼</button>
      <button id="playersBtn" class="pill player-pill">選手</button>
    </header>

    <section class="board-wrap">
      <button id="leftHandle" class="edge edge-left">‹</button>
      <button id="rightHandle" class="edge edge-right">›</button>

      <div id="court" class="court" aria-label="バレーコート">
        <div class="label opponent-label">相手コート</div>
        <div class="attack attack-top"></div>
        <div class="net"></div>
        <div class="attack attack-bottom"></div>
        <div id="ranges" class="ranges"></div>
        <div id="players" class="players"></div>
        <div id="ball" class="ball" aria-label="ボール"></div>
      </div>
    </section>

    <nav class="toolbar">
      <button id="undoBtn">↶<span>UNDO</span></button>
      <button id="rangeBtn">◌<span>範囲</span></button>
      <button id="subBtn">⇄<span>交代</span></button>
      <button id="addSceneBtn">＋<span>シーン</span></button>
      <button id="resetBtn">⌫<span>リセット</span></button>
    </nav>
  </main>

  <div id="drawerBackdrop" class="backdrop hidden"></div>

  <aside id="playersDrawer" class="drawer drawer-right hidden">
    <div class="drawer-head"><h2>選手一覧</h2><button class="closeDrawer">×</button></div>
    <div id="playerList" class="list"></div>
    <button id="addPlayerBtn" class="wide-btn">＋ 選手追加</button>
    <button id="openSubBtn" class="wide-btn secondary">⇄ 選手交代</button>
  </aside>

  <aside id="teamDrawer" class="drawer drawer-left hidden">
    <div class="drawer-head"><h2>チーム</h2><button class="closeDrawer">×</button></div>
    <div id="teamList" class="list"></div>
    <button id="addTeamBtn" class="wide-btn">＋ チーム追加</button>
  </aside>

  <aside id="sceneDrawer" class="drawer drawer-top hidden">
    <div class="drawer-head"><h2>シーン</h2><button class="closeDrawer">×</button></div>
    <div id="sceneList" class="list"></div>
    <button id="drawerAddSceneBtn" class="wide-btn">＋ シーン追加</button>
  </aside>

  <section id="editorSheet" class="sheet hidden">
    <div class="sheet-card">
      <div class="sheet-head"><h2>選手情報</h2><button id="cancelEdit">×</button></div>
      <label>ニックネーム<input id="editName" /></label>
      <div class="grid2">
        <label>学年<select id="editGrade"></select></label>
        <label>身長<select id="editHeight"></select></label>
      </div>
      <div class="grid2">
        <label>年齢<select id="editAge"></select></label>
        <label>性別<select id="editGender"><option>未設定</option><option>女子</option><option>男子</option></select></label>
      </div>
      <label>ポジション<select id="editPosition"></select></label>
      <label>コーチ専用メモ<textarea id="editCoachMemo" rows="3"></textarea></label>
      <button id="saveEdit" class="save-btn">保存する</button>
    </div>
  </section>

  <section id="subSheet" class="sheet hidden">
    <div class="sheet-card">
      <div class="sheet-head"><h2>選手交代</h2><button id="closeSub">×</button></div>
      <p class="hint">交代したいコート上の選手を選んで、控え選手を選択します。</p>
      <h3>コート上</h3>
      <div id="courtPlayersForSub" class="sub-grid"></div>
      <h3>控え</h3>
      <div id="benchPlayersForSub" class="sub-grid"></div>
      <button id="addBenchBtn" class="wide-btn">＋ 控え選手を追加</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
