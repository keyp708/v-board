<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>V Board</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button id="teamBtn" class="pill small">A</button>
      <button id="sceneBtn" class="pill main">サーブレシーブ ▼</button>
      <button id="playersBtn" class="pill small">選手</button>
    </header>

    <main class="stage">
      <div class="viewSwitch" role="tablist">
        <button id="topViewBtn" class="active">トップビュー</button>
        <button id="sideViewBtn">サイドビュー</button>
      </div>

      <section id="courtWrap" class="courtWrap">
        <div id="court" class="court" aria-label="バレーコート作戦盤">
          <div class="courtLabel opponent">相手コート</div>
          <div class="line attack opponentLine"></div>
          <div class="line attack selfLine"></div>
          <div class="net"><span></span></div>
          <div id="ball" class="ball molten" aria-label="ボール"><span>molten</span></div>
        </div>
        <button id="leftHandle" class="sideHandle left" aria-label="チーム一覧">‹</button>
        <button id="rightHandle" class="sideHandle right" aria-label="選手一覧">›</button>
      </section>

      <section id="sideView" class="sideView hidden">
        <div class="sideCourt">
          <div class="sideNet"><span>ネット 2.0m</span></div>
          <div class="trajectory"></div>
          <div class="sidePlayer self"><span>自分</span></div>
          <div class="sidePlayer opponent"><span>相手</span></div>
          <div class="sideBall molten"><span>molten</span></div>
        </div>
        <p class="sideNote">サイドビューβ：ボールの高さ・ネットとの関係を説明するための静的表示です。</p>
      </section>
    </main>

    <footer class="toolbar">
      <button id="undoBtn">↶<small>UNDO</small></button>
      <button id="rangeBtn">◌<small>範囲</small></button>
      <button id="swapBtn">⇄<small>交代</small></button>
      <button id="addSceneBtn">＋<small>シーン</small></button>
      <button id="resetBtn">⌫<small>リセット</small></button>
    </footer>
  </div>

  <div id="drawerBackdrop" class="drawerBackdrop hidden"></div>
  <aside id="drawer" class="drawer hidden" aria-hidden="true"></aside>

  <div id="sheetBackdrop" class="sheetBackdrop hidden"></div>
  <section id="playerSheet" class="sheet hidden" aria-hidden="true">
    <h2>選手情報</h2>
    <div class="formGrid">
      <label>ニックネーム<input id="fName" autocomplete="off" /></label>
      <label>性別<select id="fGender"><option>未設定</option><option>男</option><option>女</option></select></label>
      <label>学年<select id="fGrade"></select></label>
      <label>年齢<select id="fAge"></select></label>
      <label>身長<select id="fHeight"></select></label>
      <label>ポジション<select id="fPosition"></select></label>
    </div>
    <label class="memoLabel">コーチ専用メモ<textarea id="fMemo"></textarea></label>
    <div class="sheetActions">
      <button id="savePlayer" class="primary">保存</button>
      <button id="deletePlayer" class="danger">選手を削除</button>
      <button id="closeSheet">キャンセル</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
