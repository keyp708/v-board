<html lang="ja">

<style>
:root{--bg:#09adbf;--deep:#003b4b;--panel:#07566b;--court:#f6a24a;--line:#fff;--ink:#0b2530;--green:#19c58c;--marker:#171b1f;--opp:#666;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;background:linear-gradient(#07536a,#02b7c8);color:white;overflow:hidden}.app{height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 10px calc(env(safe-area-inset-bottom) + 8px);gap:8px}.top{display:grid;grid-template-columns:58px 1fr 82px;align-items:center;gap:10px}.team,.scene,.playersBtn{height:54px;border-radius:28px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.25);box-shadow:inset 0 1px rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:25px}.team{font-size:28px}.playersBtn{font-size:24px}.viewToggle{height:42px;display:flex;gap:8px;justify-content:center}.toggle{border:0;border-radius:23px;padding:0 22px;font-weight:900;font-size:16px;color:#fff;background:rgba(255,255,255,.18)}.toggle.active{background:white;color:#08495d}.main{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative}.courtWrap{width:min(92vw,56dvh);aspect-ratio:9/18;background:var(--court);border:5px solid #fff;border-radius:14px;position:relative;box-shadow:0 18px 28px rgba(0,0,0,.25),0 0 0 14px #11aec3;overflow:visible}.label{position:absolute;left:10px;background:#70451f;color:white;padding:8px 14px;border-radius:10px;font-weight:900;z-index:4}.label.opp{top:10px}.net{position:absolute;left:-2%;right:-2%;top:50%;height:18px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,#0d1418 0 5px,#f7dba6 5px 18px);border-top:4px solid #111;border-bottom:4px solid #111;z-index:3}.attack{position:absolute;left:0;right:0;border-top:3px dashed rgba(255,255,255,.85)}.attack.top{top:33.333%}.attack.bottom{top:66.666%}.sideLine{display:none}.ball{position:absolute;width:48px;height:48px;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9;touch-action:none;filter:drop-shadow(0 22px 13px rgba(0,0,0,.28));background:conic-gradient(#fff 0 18%,#e5352c 18% 35%,#fff 35% 52%,#009a72 52% 70%,#fff 70% 84%,#e5352c 84%);border:2px solid #e8f7fb;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#093f4e}.ball.mikasa{background:conic-gradient(#ffe100 0 28%,#0056b8 28% 45%,#ffe100 45% 70%,#fff 70% 80%,#0056b8 80%);color:#004f9f}.player{position:absolute;width:56px;height:56px;border-radius:50%;transform:translate(-50%,-50%);z-index:6;touch-action:none;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(circle at 35% 25%,#60676b,#16191c 74%);border:4px solid white;box-shadow:0 9px 12px rgba(0,0,0,.35);color:#fff;font-weight:900;line-height:1.05;text-align:center;overflow:hidden}.player.opp{background:radial-gradient(circle at 35% 25%,#9a9a9a,#555 72%);opacity:.95}.player.selected{outline:4px solid var(--green)}.name{font-size:15px;max-width:48px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pos{font-size:10px;max-width:46px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.95;border-top:1px solid rgba(255,255,255,.35);padding-top:2px;margin-top:2px}.name.posonly{font-size:12px;max-width:50px}.player.opp .name{font-size:12px;max-width:50px}.area{position:absolute;border:2px dotted rgba(255,255,255,.9);border-radius:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none}.area.selected{border:3px solid var(--green);background:rgba(25,197,140,.05)}.handle{position:absolute;width:18px;height:18px;border-radius:50%;background:#eafff7;border:3px solid var(--green);z-index:8;transform:translate(-50%,-50%);touch-action:none}.rotate{background:#1b2126;border-color:white}.bottom{height:78px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.btn{border:0;border-radius:18px;background:#00485b;color:#fff;font-weight:900;font-size:15px;box-shadow:0 6px 12px rgba(0,0,0,.25)}.btn small{display:block;font-size:23px;line-height:1}.drawerHandle{position:absolute;top:48%;width:46px;height:112px;border-radius:0 25px 25px 0;background:rgba(0,64,80,.75);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;z-index:20}.drawerHandle.right{right:-10px;border-radius:25px 0 0 25px}.drawerHandle.left{left:-10px}.overlay{position:fixed;inset:0;background:rgba(0,25,35,.25);z-index:50;display:none}.overlay.show{display:block}.sheet{position:absolute;left:7vw;right:7vw;top:12vh;max-height:82vh;overflow:auto;background:linear-gradient(rgba(0,165,187,.94),rgba(0,89,112,.94));border-radius:20px;padding:24px 28px;box-shadow:0 20px 45px rgba(0,0,0,.35)}.sheet h2{margin:0 0 20px;font-size:28px}.x{position:absolute;right:20px;top:18px;width:52px;height:52px;border-radius:50%;border:0;background:rgba(255,255,255,.2);color:white;font-size:34px}.listItem{display:grid;grid-template-columns:54px 1fr 20px;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.18)}.badge{width:46px;height:46px;border-radius:50%;background:#111;border:2px solid rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;font-weight:900}.liName{font-size:24px;font-weight:900}.liMeta{font-size:15px;opacity:.9}.add{width:100%;height:60px;border:0;border-radius:18px;margin-top:18px;background:rgba(255,255,255,.18);color:white;font-weight:900;font-size:20px}.form{position:fixed;left:0;right:0;bottom:0;background:white;color:#243846;border-radius:28px 28px 0 0;z-index:60;padding:26px 18px calc(env(safe-area-inset-bottom) + 18px);display:none;max-height:88vh;overflow:auto}.form.show{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field label{display:block;font-weight:900;margin-bottom:8px;color:#405362}.field input,.field select,.field textarea{width:100%;border:1px solid #d8e4ea;border-radius:12px;padding:14px 12px;font-size:18px;background:#f7fbfd}.field textarea{min-height:88px}.save{width:100%;height:62px;border:0;border-radius:16px;background:#096bde;color:white;font-size:22px;font-weight:900;margin-top:20px}.delete{margin-top:18px;color:#e22;font-weight:900}.sideView{display:none;width:92vw;max-width:640px;height:58dvh;background:#fff;border-radius:20px;color:#123;padding:18px;box-shadow:0 16px 35px rgba(0,0,0,.28)}.sideCourt{height:100%;background:linear-gradient(#dff7fb,#fff);border-radius:16px;position:relative;overflow:hidden}.floor{position:absolute;left:20px;right:20px;bottom:45px;height:6px;background:#f6a24a}.sideNet{position:absolute;left:50%;bottom:45px;width:6px;height:52%;background:#14232b}.netLabel{position:absolute;left:calc(50% + 12px);bottom:calc(45px + 52%);font-weight:900;color:#07566b}.sideBall{position:absolute;left:55%;bottom:46%;width:36px;height:36px;border-radius:50%;background:conic-gradient(#fff 0 18%,#e5352c 18% 35%,#fff 35% 52%,#009a72 52% 70%,#fff 70%);border:2px solid #ddd}.person{position:absolute;bottom:51px;width:26px;border-radius:12px 12px 4px 4px;background:#0b4d66}.p1{height:92px;left:27%}.p2{height:112px;left:66%}.arc{position:absolute;left:28%;right:28%;bottom:38%;height:38%;border-top:4px dashed #0c8ca5;border-radius:50%}.hint{position:absolute;left:14px;right:14px;bottom:12px;text-align:center;color:#456;font-weight:800}.logoMark{position:fixed;left:-9999px}.toast{position:fixed;left:16px;right:16px;bottom:100px;background:#112;color:white;padding:14px;border-radius:14px;text-align:center;font-weight:900;display:none;z-index:99}@media (min-width:900px){.app{max-width:760px;margin:auto}.courtWrap{width:min(72vw,62dvh)}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="team" id="teamBtn">A</div><div class="scene" id="sceneBtn">サーブレシーブ ▼</div><div class="playersBtn" id="playersBtn">選手</div></div>
  <div class="viewToggle"><button class="toggle active" id="topViewBtn">トップビュー</button><button class="toggle" id="sideViewBtn">サイドビュー</button></div>
  <div class="main" id="main">
    <div class="drawerHandle left" id="teamHandle">‹</div><div class="drawerHandle right" id="playerHandle">›</div>
    <div class="courtWrap" id="court"><div class="label opp">相手コート</div><div class="attack top"></div><div class="net"></div><div class="attack bottom"></div><div class="ball molten" id="ball">molten</div></div>
    <div class="sideView" id="sideView"><div class="sideCourt"><div class="arc"></div><div class="floor"></div><div class="sideNet"></div><div class="netLabel">ネット 2.0m</div><div class="person p1"></div><div class="person p2"></div><div class="sideBall"></div><div class="hint">サイドビューβ：高さ・軌道の説明用</div></div></div>
  </div>
  <div class="bottom"><button class="btn" id="undoBtn"><small>↶</small>UNDO</button><button class="btn" id="areaBtn"><small>◌</small>範囲</button><button class="btn" id="swapBtn"><small>⇄</small>交代</button><button class="btn" id="addSceneBtn"><small>＋</small>シーン</button><button class="btn" id="resetBtn"><small>⌫</small>リセット</button></div>
</div>
<div class="overlay" id="playersOverlay"><div class="sheet" id="playersSheet"><button class="x" data-close="playersOverlay">×</button><h2>選手一覧</h2><div id="playerList"></div><button class="add" id="addPlayerBtn">＋ 選手追加</button><button class="add" id="ballTypeBtn">ボール：モルテン風</button></div></div>
<div class="overlay" id="teamOverlay"><div class="sheet"><button class="x" data-close="teamOverlay">×</button><h2>チーム管理</h2><div id="teamList"></div><button class="add" id="addTeamBtn">＋ チーム追加</button></div></div>
<div class="overlay" id="sceneOverlay"><div class="sheet"><button class="x" data-close="sceneOverlay">×</button><h2>シーン</h2><div id="sceneList"></div><button class="add" id="newSceneBtn">＋ シーン追加</button></div></div>
<div class="form" id="editForm"><h2>選手情報</h2><div class="grid"><div class="field"><label>ニックネーム</label><input id="nick" placeholder=""></div><div class="field"><label>性別</label><select id="gender"><option>未設定</option><option>女の子</option><option>男の子</option></select></div><div class="field"><label>学年</label><select id="grade"></select></div><div class="field"><label>年齢</label><select id="age"></select></div><div class="field"><label>身長</label><select id="height"></select></div><div class="field"><label>ポジション</label><select id="position"></select></div></div><div class="field" style="margin-top:16px"><label>コーチ専用メモ</label><textarea id="memo"></textarea></div><button class="save" id="savePlayerBtn">保存</button><div class="delete" id="deletePlayerBtn">選手を削除</div></div>
<div class="toast" id="toast"></div>
<script>
const POS=[{id:'S',jp:'セッター',short:'S'},{id:'L',jp:'レフト',short:'L'},{id:'C',jp:'センター',short:'C'},{id:'R',jp:'ライト',short:'R'},{id:'BL',jp:'Bレフト',short:'BL'},{id:'BR',jp:'Bライト',short:'BR'}];
const defaultCoords={S:[50,62],L:[26,70],C:[50,72],R:[74,70],BL:[35,84],BR:[65,84]};
const oppCoords={S:[50,38],L:[26,30],C:[50,28],R:[74,30],BL:[35,16],BR:[65,16]};
const KEY='vboard-s17-checked-v1';
let state=load(); let selected=null, mode='top', swapFirst=null, dragging=null, longTimer=null;
function defaultPlayers(team='A'){return POS.map((p,i)=>({id:crypto.randomUUID(),nick:'',grade:4,age:10,height:135,gender:'未設定',position:p.id,memo:'',side:'self',x:defaultCoords[p.id][0],y:defaultCoords[p.id][1],area:{r:12,rx:12,ry:12,rot:0}}));}
function defaultOpp(){return POS.map(p=>({id:'opp-'+p.id,position:p.id,side:'opp',x:oppCoords[p.id][0],y:oppCoords[p.id][1],area:{r:12,rx:12,ry:12,rot:0}}));}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||makeDefault()}catch(e){return makeDefault()}}
function makeDefault(){return{team:'A',scene:'サーブレシーブ',ballType:'molten',teams:['A'],scenes:['サーブレシーブ'],data:{A:{players:defaultPlayers(),opponents:defaultOpp(),scenes:{'サーブレシーブ':{ball:{x:50,y:50},players:null,opponents:null}}}}}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function cur(){if(!state.data[state.team])state.data[state.team]={players:defaultPlayers(),opponents:defaultOpp(),scenes:{}}; let t=state.data[state.team]; if(!t.scenes[state.scene])t.scenes[state.scene]={ball:{x:50,y:50},players:null,opponents:null}; return t;}
function sceneState(){return cur().scenes[state.scene];}
function activePlayers(){let s=sceneState(),t=cur(); if(!s.players)s.players=structuredClone(t.players); if(!s.opponents)s.opponents=structuredClone(t.opponents); return [...s.opponents,...s.players];}
function ppos(id){return POS.find(p=>p.id===id)||POS[0]}
function render(){document.getElementById('teamBtn').textContent=state.team;document.getElementById('sceneBtn').textContent=state.scene+' ▼'; let court=document.getElementById('court'); court.querySelectorAll('.player,.area,.handle').forEach(e=>e.remove()); const players=activePlayers(); players.forEach(p=>drawArea(court,p)); players.forEach(p=>drawPlayer(court,p)); let b=sceneState().ball||{x:50,y:50}; let ball=document.getElementById('ball'); ball.style.left=b.x+'%'; ball.style.top=b.y+'%'; ball.className='ball '+state.ballType; ball.textContent=state.ballType==='molten'?'molten':''; save(); renderLists();}
function drawArea(court,p){let a=p.area||{r:12,rx:12,ry:12,rot:0}; if(!a.rx||!a.ry||Math.abs(a.rx-a.ry)<.5){a.rx=a.ry=a.r||9} let el=document.createElement('div'); el.className='area '+(selected===p.id?'selected':''); el.style.left=p.x+'%'; el.style.top=p.y+'%'; el.style.width=(a.rx*2)+'%'; el.style.height=(a.ry*2)+'%'; el.style.transform=`translate(-50%,-50%) rotate(${a.rot||0}deg)`; court.appendChild(el); if(selected===p.id)drawHandles(court,p,a)}
function drawHandles(court,p,a){[['e',p.x+a.rx,p.y],['s',p.x,p.y+a.ry],['scale',p.x+a.rx*.72,p.y+a.ry*.72],['rot',p.x+a.rx*.72,p.y-a.ry*.72]].forEach(([type,x,y])=>{let h=document.createElement('div');h.className='handle '+(type==='rot'?'rotate':'');h.dataset.handle=type;h.dataset.id=p.id;h.style.left=x+'%';h.style.top=y+'%';court.appendChild(h);h.addEventListener('pointerdown',startHandle)});}
function drawPlayer(court,p){let el=document.createElement('div'); el.className='player '+(p.side==='opp'?'opp ':'')+(selected===p.id?'selected':''); el.dataset.id=p.id; el.style.left=p.x+'%'; el.style.top=p.y+'%'; const pos=ppos(p.position).jp; const isSelf=p.side==='self'; const name=(p.nick||'').trim(); if(isSelf&&name){el.innerHTML=`<div class="name">${esc(name)}</div><div class="pos">${esc(pos)}</div>`;}else{el.innerHTML=`<div class="name posonly">${esc(pos)}</div>`;} court.appendChild(el); bindPlayer(el,p);}
function bindPlayer(el,p){el.addEventListener('pointerdown',e=>{e.preventDefault(); selected=p.id; dragging={id:p.id,moved:false}; el.setPointerCapture(e.pointerId); longTimer=setTimeout(()=>{dragging=null; openEdit(p.id)},650);}); el.addEventListener('pointermove',e=>{if(!dragging||dragging.id!==p.id)return; clearTimeout(longTimer); dragging.moved=true; let r=document.getElementById('court').getBoundingClientRect(); p.x=Math.max(4,Math.min(96,(e.clientX-r.left)/r.width*100)); p.y=Math.max(4,Math.min(96,(e.clientY-r.top)/r.height*100)); el.style.left=p.x+'%'; el.style.top=p.y+'%';}); el.addEventListener('pointerup',e=>{clearTimeout(longTimer); if(dragging&&dragging.moved){syncPlayerToMaster(p); save(); render(); dragging=null; return;} if(swapFirst&&swapFirst!==p.id){swapPlayers(swapFirst,p.id); swapFirst=null; toast('交代しました');} else if(document.body.dataset.swap==='on'){swapFirst=p.id;toast('交代する相手をタップ');} dragging=null; render(); save();});}
function startHandle(e){e.preventDefault(); e.stopPropagation(); let id=e.currentTarget.dataset.id,type=e.currentTarget.dataset.handle; let p=activePlayers().find(x=>x.id===id); let r=document.getElementById('court').getBoundingClientRect(); const move=ev=>{let x=(ev.clientX-r.left)/r.width*100,y=(ev.clientY-r.top)/r.height*100; p.area=p.area||{r:12,rx:12,ry:12,rot:0}; if(type==='e')p.area.rx=Math.max(9,Math.abs(x-p.x)); if(type==='s')p.area.ry=Math.max(9,Math.abs(y-p.y)); if(type==='scale'){let d=Math.hypot(x-p.x,y-p.y); p.area.rx=p.area.ry=Math.max(9,d);} if(type==='rot')p.area.rot=Math.atan2(y-p.y,x-p.x)*180/Math.PI+45; render();}; const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);save();}; window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);}
function swapPlayers(a,b){let ps=activePlayers(); let p1=ps.find(p=>p.id===a),p2=ps.find(p=>p.id===b); if(!p1||!p2)return; [p1.x,p2.x]=[p2.x,p1.x];[p1.y,p2.y]=[p2.y,p1.y]; syncPlayerToMaster(p1); syncPlayerToMaster(p2); render();}
function syncPlayerToMaster(p){let t=cur(); let arr=p.side==='opp'?t.opponents:t.players; let m=arr.find(x=>x.id===p.id); if(m)Object.assign(m,p);}
function openEdit(id){let p=activePlayers().find(x=>x.id===id); if(!p||p.side==='opp')return; selected=id; ['nick','gender','grade','age','height','position','memo'].forEach(k=>{let el=document.getElementById(k); if(el)el.value=p[k]??''}); document.getElementById('editForm').classList.add('show'); render();}
function setupSelects(){let g=document.getElementById('grade'),age=document.getElementById('age'),h=document.getElementById('height'),pos=document.getElementById('position'); for(let i=1;i<=6;i++)g.add(new Option(i+'年',i)); for(let i=6;i<=18;i++)age.add(new Option(i+'歳',i)); for(let i=100;i<=180;i++)h.add(new Option(i+'cm',i)); POS.forEach(p=>pos.add(new Option(p.jp,p.id)));}
function renderLists(){let pl=document.getElementById('playerList'); if(!pl)return; pl.innerHTML=''; cur().players.forEach((p,i)=>{let d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="badge">${i+1}</div><div><div class="liName">${esc(p.nick||ppos(p.position).jp)}</div><div class="liMeta">${ppos(p.position).jp} / ${p.grade}年 / ${p.height}cm</div></div><div>›</div>`; d.onclick=()=>openEdit(p.id); pl.appendChild(d);}); let tl=document.getElementById('teamList'); tl.innerHTML=''; state.teams.forEach(t=>{let d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="badge">${esc(t)}</div><div><div class="liName">${esc(t)}チーム</div></div><div>›</div>`; d.onclick=()=>{state.team=t;closeAll();render()}; tl.appendChild(d);}); let sl=document.getElementById('sceneList'); sl.innerHTML=''; state.scenes.forEach(s=>{let d=document.createElement('div'); d.className='listItem'; d.innerHTML=`<div class="badge">🏐</div><div><div class="liName">${esc(s)}</div></div><div>›</div>`; d.onclick=()=>{state.scene=s;closeAll();render()}; sl.appendChild(d);});}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function closeAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'));document.getElementById('editForm').classList.remove('show')}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',1300)}
function switchMode(m){mode=m;document.getElementById('court').style.display=m==='top'?'block':'none';document.getElementById('sideView').style.display=m==='side'?'block':'none';document.getElementById('topViewBtn').classList.toggle('active',m==='top');document.getElementById('sideViewBtn').classList.toggle('active',m==='side')}
function fixOld(){activePlayers().forEach(p=>{if(!p.area)p.area={r:12,rx:12,ry:12,rot:0}; if(!p.area.rx||!p.area.ry){p.area.rx=p.area.ry=12} if(Math.abs(p.area.rx-p.area.ry)>.5 && !localStorage.getItem(KEY+'-kept')){p.area.rx=p.area.ry=12} }); save();}
setupSelects(); fixOld(); render();
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>document.getElementById(b.dataset.close).classList.remove('show'));
document.getElementById('playersBtn').onclick=()=>document.getElementById('playersOverlay').classList.add('show');document.getElementById('playerHandle').onclick=()=>document.getElementById('playersOverlay').classList.add('show');document.getElementById('teamHandle').onclick=()=>document.getElementById('teamOverlay').classList.add('show');document.getElementById('teamBtn').onclick=()=>document.getElementById('teamOverlay').classList.add('show');document.getElementById('sceneBtn').onclick=()=>document.getElementById('sceneOverlay').classList.add('show');document.getElementById('addSceneBtn').onclick=()=>document.getElementById('sceneOverlay').classList.add('show');document.getElementById('newSceneBtn').onclick=()=>{let n=prompt('シーン名');if(n){state.scenes.push(n);state.scene=n;render();closeAll()}};document.getElementById('addTeamBtn').onclick=()=>{let n=prompt('チーム名');if(n&&!state.teams.includes(n)){state.teams.push(n);state.team=n;state.data[n]={players:defaultPlayers(),opponents:defaultOpp(),scenes:{[state.scene]:{ball:{x:50,y:50}}}};render();closeAll()}};document.getElementById('addPlayerBtn').onclick=()=>{let p={...defaultPlayers()[0],id:crypto.randomUUID(),position:'S',x:50,y:62};cur().players.push(p);sceneState().players=null;render();openEdit(p.id)};
document.getElementById('savePlayerBtn').onclick=()=>{let p=activePlayers().find(x=>x.id===selected); if(p){['nick','gender','grade','age','height','position','memo'].forEach(k=>p[k]=document.getElementById(k).value); syncPlayerToMaster(p); closeAll();render();toast('保存しました')}};document.getElementById('deletePlayerBtn').onclick=()=>{let t=cur();t.players=t.players.filter(p=>p.id!==selected);sceneState().players=t.players;closeAll();render()};
document.getElementById('ballTypeBtn').onclick=()=>{state.ballType=state.ballType==='molten'?'mikasa':'molten';document.getElementById('ballTypeBtn').textContent='ボール：'+(state.ballType==='molten'?'モルテン風':'ミカサ風');render()};
document.getElementById('topViewBtn').onclick=()=>switchMode('top');document.getElementById('sideViewBtn').onclick=()=>switchMode('side');document.getElementById('swapBtn').onclick=()=>{document.body.dataset.swap=document.body.dataset.swap==='on'?'':'on';toast(document.body.dataset.swap==='on'?'交代モード':'交代解除')};document.getElementById('resetBtn').onclick=()=>{if(confirm('このシーンの配置を初期化しますか？')){let t=cur();t.players=defaultPlayers();t.opponents=defaultOpp();t.scenes[state.scene]={ball:{x:50,y:50},players:null,opponents:null};render()}};document.getElementById('areaBtn').onclick=()=>toast('選手を選んで白い点で範囲調整');
document.getElementById('ball').addEventListener('pointerdown',e=>{e.preventDefault();let ball=e.currentTarget;ball.setPointerCapture(e.pointerId);const move=ev=>{let r=document.getElementById('court').getBoundingClientRect();sceneState().ball={x:Math.max(3,Math.min(97,(ev.clientX-r.left)/r.width*100)),y:Math.max(3,Math.min(97,(ev.clientY-r.top)/r.height*100))};render()};const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);save()};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up)});
let startX=0;document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('touchstart',e=>startX=e.touches[0].clientX);o.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-startX;if(Math.abs(dx)>80)o.classList.remove('show')})});
</script>
</body></html>
