<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06a96b" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>V Board</title>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">V</div>
        <div><h1>V Board</h1><p>Visual Volleyball Coaching</p></div>
      </div>
      <div class="top-actions">
        <button id="playersListBtn" class="mini-btn">選手</button>
        <button id="fullscreenBtn" class="mini-btn">全画面</button>
        <span class="status" id="saveStatus">保存済み</span>
      </div>
    </header>

    <section class="scenario-bar" aria-label="シチュエーション">
      <button class="scenario active" data-scenario="serveReceive"><span>🏐</span><b>サーブレシーブ</b></button>
      <button class="scenario" data-scenario="leftAttack"><span>↙</span><b>相手レフト</b></button>
      <button class="scenario" data-scenario="chance"><span>✨</span><b>チャンス</b></button>
      <button class="scenario reset" id="resetBtn"><span>↺</span><b>リセット</b></button>
    </section>

    <section class="court-shell">
      <div class="court-wrap" id="courtWrap">
        <div class="court" id="court">
          <div class="court-label opponent">相手コート</div>
          <div class="court-label home">自分コート</div>
          <div class="attack-line top"></div>
          <div class="attack-line bottom"></div>
          <div class="net"></div>
          <div id="coverageLayer"></div>
          <div id="playersLayer"></div>
          <div class="ball" id="ball" aria-label="ball"></div>
        </div>
      </div>
    </section>

    <section class="coach-card">
      <div>
        <h2 id="sceneTitle">サーブレシーブ</h2>
        <p id="hint">選手・ボールをドラッグ。選手を長押しで情報編集。選択中の守備範囲はハンドルか2本指で調整。</p>
      </div>
    </section>
  </main>

  <div id="modalRoot"></div>
  <script src="app.js"></script>
</body>
</html>
